<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <radialGradient id="globeGrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#5BA3D9"/>
      <stop offset="100%" stop-color="#1A5C8A"/>
    </radialGradient>
    <radialGradient id="globeShine" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="globeClip">
      <circle cx="40" cy="40" r="28"/>
    </clipPath>
  </defs>
  <!-- Globo base -->
  <circle cx="40" cy="40" r="28" fill="url(#globeGrad)"/>
  <!-- Líneas de latitud -->
  <g clip-path="url(#globeClip)" stroke="#C9A84C" stroke-width="0.7" fill="none" opacity="0.7">
    <ellipse cx="40" cy="40" rx="28" ry="28"/>
    <ellipse cx="40" cy="40" rx="28" ry="18"/>
    <ellipse cx="40" cy="40" rx="28" ry="8"/>
    <line x1="12" y1="40" x2="68" y2="40"/>
    <line x1="16" y1="28" x2="64" y2="28"/>
    <line x1="16" y1="52" x2="64" y2="52"/>
    <!-- Líneas de longitud -->
    <ellipse cx="40" cy="40" rx="14" ry="28"/>
    <ellipse cx="40" cy="40" rx="24" ry="28"/>
    <ellipse cx="40" cy="40" rx="4" ry="28"/>
  </g>
  <!-- Brillo -->
  <circle cx="40" cy="40" r="28" fill="url(#globeShine)"/>
  <!-- Borde dorado -->
  <circle cx="40" cy="40" r="28" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
  <!-- Continente estilizado (silueta América del Sur) -->
  <path d="M35,30 Q38,28 40,30 L41,36 Q42,40 40,45 Q38,50 36,48 Q33,44 34,38 Z"
        fill="#2E7D32" opacity="0.6" clip-path="url(#globeClip)"/>
</svg>
